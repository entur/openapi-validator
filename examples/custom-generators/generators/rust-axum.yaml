name: rust-axum
scope: server
generate:
  image: openapitools/openapi-generator-cli:v7.17.0
  command: >-
    generate
    -i {spec}
    -g rust-axum
    -o /work/.oav/generated/server/rust-axum
    --additional-properties=packageName=openapi_server
compile:
  image: rust:1.85-alpine
  command: cargo build --release
