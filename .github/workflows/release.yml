name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tags:
        description: 'JSON array of tags to publish, for example ["cli-v0.7.1","gui-v0.1.0"]'
        required: false
        type: string

jobs:
  release-please:
    if: github.event_name == 'push'
    uses: entur/gha-meta/.github/workflows/release.yml@v1
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      release_type: manifest

  # release-please creates tags via the GitHub API, which (per GitHub's
  # anti-recursion rule) would NOT trigger a separate tag-push-triggered
  # workflow. So instead of a second workflow listening for tag pushes, we
  # discover what it just tagged as a later job in this same run.
  # If release-please creates tags but exits non-zero after a transient GitHub
  # API failure, still publish the tags that landed on the merge commit.
  discover-tags:
    needs: release-please
    if: always() && needs.release-please.result != 'cancelled' && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.releases_created == 'true' || needs.release-please.result == 'failure')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.find.outputs.tags }}
      bin_tags: ${{ steps.find.outputs.bin_tags }}
      gui_tags: ${{ steps.find.outputs.gui_tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - id: find
        shell: bash
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && '${{ inputs.tags }}' != '' ]]; then
            tags='${{ inputs.tags }}'
            jq -e 'type == "array" and all(.[]; type == "string" and test("^(cli|tui|gui)-v"))' <<< "$tags" > /dev/null
          else
            tags="$(git tag --points-at HEAD | awk '/^(cli|tui|gui)-v/' | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          fi
          bin_tags="$(jq -c 'map(select(startswith("gui-v") | not))' <<< "$tags")"
          gui_tags="$(jq -c 'map(select(startswith("gui-v")))' <<< "$tags")"
          echo "Found tags: ${tags}"
          {
            echo "tags=${tags}"
            echo "bin_tags=${bin_tags}"
            echo "gui_tags=${gui_tags}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: discover-tags
    if: always() && needs.discover-tags.result == 'success' && needs.discover-tags.outputs.bin_tags != '[]'
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.discover-tags.outputs.bin_tags) }}
        target:
          - { triple: aarch64-apple-darwin, os: macos-14 }
          - { triple: x86_64-apple-darwin, os: macos-14 }
          - { triple: x86_64-unknown-linux-gnu, os: ubuntu-24.04 }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: parse
        shell: bash
        run: |
          tag="${{ matrix.tag }}"
          case "$tag" in
            cli-v*) crate=cli; binary=oav; version="${tag#cli-v}" ;;
            tui-v*) crate=tui; binary=lazyoav; version="${tag#tui-v}" ;;
            *) echo "::error::unrecognized tag: $tag"; exit 1 ;;
          esac
          {
            echo "crate=${crate}"
            echo "binary=${binary}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target.triple }}
          cache: false
      - name: Build
        run: cargo build --release --locked -p oav-${{ steps.parse.outputs.crate }} --target ${{ matrix.target.triple }}
      - name: Package
        shell: bash
        run: |
          bin="${{ steps.parse.outputs.binary }}"
          version="${{ steps.parse.outputs.version }}"
          triple="${{ matrix.target.triple }}"
          asset="${bin}-${version}-${triple}.tar.gz"

          mkdir -p dist
          cp "target/${triple}/release/${bin}" "dist/${bin}"
          tar -C dist -czf "${asset}" "${bin}"
          shasum -a 256 "${asset}" > "${asset}.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.tag }}-${{ matrix.target.triple }}
          path: |
            *.tar.gz
            *.tar.gz.sha256
          retention-days: 1

  # The GUI is a Tauri app: the frontend must be built with npm and the
  # binary bundled into platform installers (dmg/deb/rpm/AppImage) instead of
  # a bare tarball, so it gets its own job. Bundles are unsigned; macOS users
  # must right-click > Open (or clear the quarantine attribute) on first launch.
  build-gui:
    needs: discover-tags
    if: always() && needs.discover-tags.result == 'success' && needs.discover-tags.outputs.gui_tags != '[]'
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.discover-tags.outputs.gui_tags) }}
        target:
          - { triple: aarch64-apple-darwin, os: macos-14, bundles: dmg }
          - { triple: x86_64-apple-darwin, os: macos-14, bundles: dmg }
          - { triple: x86_64-unknown-linux-gnu, os: ubuntu-24.04, bundles: "deb,rpm,appimage" }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target.triple }}
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/gui/package-lock.json
      - run: npm ci
        working-directory: crates/gui
      - name: Build
        working-directory: crates/gui
        run: npx tauri build --target ${{ matrix.target.triple }} --bundles ${{ matrix.target.bundles }}
      - name: Package
        shell: bash
        run: |
          version="${{ matrix.tag }}"
          version="${version#gui-v}"
          triple="${{ matrix.target.triple }}"
          bundle_dir="target/${triple}/release/bundle"

          mkdir -p dist
          shopt -s nullglob
          for file in "${bundle_dir}"/dmg/*.dmg "${bundle_dir}"/deb/*.deb "${bundle_dir}"/rpm/*.rpm "${bundle_dir}"/appimage/*.AppImage; do
            asset="oav-gui-${version}-${triple}.${file##*.}"
            cp "$file" "dist/${asset}"
            (cd dist && shasum -a 256 "${asset}" > "${asset}.sha256")
          done

          if [[ -z "$(ls -A dist)" ]]; then
            echo "::error::no bundles produced under ${bundle_dir}"
            exit 1
          fi
          ls -la dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assets-${{ matrix.tag }}-${{ matrix.target.triple }}
          path: dist/*
          retention-days: 1

  publish:
    needs: [discover-tags, build, build-gui]
    if: >-
      always() && needs.discover-tags.result == 'success' &&
      needs.discover-tags.outputs.tags != '[]' &&
      contains(fromJson('["success", "skipped"]'), needs.build.result) &&
      contains(fromJson('["success", "skipped"]'), needs.build-gui.result)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: assets-*
          merge-multiple: true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for tag in $(echo '${{ needs.discover-tags.outputs.tags }}' | jq -r '.[]'); do
            version="${tag#*-v}"
            case "$tag" in
              cli-v*) prefix=oav ;;
              tui-v*) prefix=lazyoav ;;
              gui-v*) prefix=oav-gui ;;
            esac
            # Version-scoped glob so cli's oav-* never matches oav-gui-* assets.
            gh release upload "$tag" dist/"${prefix}-${version}"-* \
              --repo "${{ github.repository }}" --clobber
          done
      - name: Update Homebrew formulas
        shell: bash
        run: |
          for tag in $(echo '${{ needs.discover-tags.outputs.tags }}' | jq -r '.[]'); do
            version="${tag#*-v}"
            case "$tag" in
              cli-v*) formula=Formula/oav.rb; prefix=oav ;;
              tui-v*) formula=Formula/lazyoav.rb; prefix=lazyoav ;;
              # No homebrew distribution for the GUI; installers are attached
              # to the GitHub release instead.
              gui-v*) continue ;;
            esac
            .github/scripts/update-formula.sh "$formula" "$version" dist "$prefix"
          done
      # Branch protection on main requires a reviewed PR (no bot bypass is
      # configured), so this can't push directly like the other steps here.
      - name: Open PR with updated formulas
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: Formula/
          commit-message: "chore: update homebrew formula checksums"
          title: "chore: update homebrew formula checksums"
          body: "Automated update after ${{ needs.discover-tags.outputs.tags }} published."
          branch: update-homebrew-formulas
          delete-branch: true
