name: swift5
scope: client
generate:
  image: openapitools/openapi-generator-cli:v7.17.0
  command: >-
    generate
    -i {spec}
    -g swift5
    -o /work/.oav/generated/client/swift5
    --additional-properties=projectName=APIClient,responseAs=AsyncAwait
compile:
  image: swift:6.1
  command: swift build
